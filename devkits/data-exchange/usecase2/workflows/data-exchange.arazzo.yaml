arazzo: 1.0.1
info:
  title: Energy Data Exchange Workflow - Use Case 2 (ARR Filing)
  version: 1.0.0
  description: >
    End-to-end Beckn 2.0 workflow for inline ARR filing exchange.
    The main delivery happens in on_confirm with DatasetItem dataPayload.

    Run via the workflow runner (from usecase2/workflows/):

      Local mode:
        ./run-arazzo.sh
        ./run-arazzo.sh -w select-through-confirm -v

      Over-internet mode:
        PUBLIC_URL=https://<host>.ngrok-free.dev ./run-arazzo.sh

      Direct respect invocation:
        npx @redocly/cli respect data-exchange.arazzo.yaml \
          --severity 'SCHEMA_CHECK=off' -v

sourceDescriptions:
  - name: beckn-bap-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8081/bap/caller

  - name: beckn-bpp-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8082/bpp/caller

workflows:
  - workflowId: publish-catalog
    summary: Discom publishes ARR filing catalog to catalog service
    steps:
      - stepId: publish-catalog
        description: Discom publishes ARR filing catalog with DatasetItem resources
        operationId: beckn-bpp-caller.catalogPublish
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/publish-catalog.json"

  - workflowId: discover
    summary: Regulator discovers available ARR filings via discover service
    steps:
      - stepId: discover
        description: Regulator discovers available ARR filing datasets on the network
        operationId: beckn-bap-caller.discover
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/discover-request.json"

  - workflowId: select-through-confirm
    summary: Regulator selects, confirms, and receives ARR filing inline on confirm
    steps:
      - stepId: select
        description: Regulator selects ARR filing dataset for inline delivery
        operationId: beckn-bap-caller.select
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/select-request.json"

      - stepId: on-select
        description: Discom responds with terms for the selected ARR filing
        operationId: beckn-bpp-caller.onSelect
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-select-response.json"

      - stepId: init
        description: Regulator provides details for ARR filing exchange
        operationId: beckn-bap-caller.init
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/init-request.json"

      - stepId: on-init
        description: Discom confirms the contract is ready for confirmation
        operationId: beckn-bpp-caller.onInit
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-init-response.json"

      - stepId: confirm
        description: Regulator confirms the ARR filing exchange
        operationId: beckn-bap-caller.confirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/confirm-request.json"

      - stepId: on-confirm
        description: Discom confirms the contract and delivers ARR filing inline
        operationId: beckn-bpp-caller.onConfirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-confirm-response.json"

  - workflowId: cancellation
    summary: ARR filing exchange cancellation
    steps:
      - stepId: cancel
        description: Regulator cancels the ARR filing exchange
        operationId: beckn-bap-caller.cancel
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/cancel-request.json"

      - stepId: on-cancel
        description: Discom confirms cancellation
        operationId: beckn-bpp-caller.onCancel
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-cancel-response.json"
