# Over-internet variant of docker-compose-adapter.yml.
#
# BAP-side and BPP-side services live on separate, mutually unreachable
# docker networks (bap_side, bpp_side). Each side has its own redis. The
# beckn-router is the ONLY container with a foot in both networks; it accepts
# inbound public traffic on :9000 and routes /bap/* and /bpp/* to the
# respective onix adapter on its own side.
#
# Effect: onix-bap cannot resolve or reach onix-bpp on the docker bridge.
# The only path between BAP and BPP is the public URL fronting the router,
# so any successful workflow run proves end-to-end internet traversal.
#
# Usage (do not run alongside docker-compose-adapter.yml; pick one):
#   cd install
#   docker compose -f docker-compose-over-internet.yml up -d
#
# Then start ngrok and run usecase{1,2}/run-arazzo.sh with PUBLIC_URL set,
# as documented in the README's "Run end-to-end over the public internet"
# section.

services:
  # ---------- BAP side ----------
  redis-bap:
    image: redis:alpine
    hostname: redis
    networks:
      - bap_side
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-bap:
    image: fidedocker/onix-adapter:1.5.1
    platform: linux/amd64
    networks:
      - bap_side
    ports:
      - "8081:8081"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bap.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
    command: ["./server", "--config=/app/config/local-simple-bap.yaml"]

  sandbox-bap:
    image: fidedocker/sandbox-2.0:latest
    environment:
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bap_side

  # ---------- BPP side ----------
  redis-bpp:
    image: redis:alpine
    hostname: redis
    networks:
      - bpp_side
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-bpp:
    image: fidedocker/onix-adapter:1.5.1
    platform: linux/amd64
    networks:
      - bpp_side
    ports:
      - "8082:8082"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bpp.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
    command: ["./server", "--config=/app/config/local-simple-bpp.yaml"]

  sandbox-bpp:
    image: fidedocker/sandbox-2.0:latest
    environment:
      - NODE_ENV=production
      - PORT=3002
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bpp_side

  # ---------- Public-facing path router (only container on both sides) ----------
  beckn-router:
    image: caddy:alpine
    ports:
      - "9000:9000"
    networks:
      - bap_side
      - bpp_side
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile

networks:
  bap_side:
    driver: bridge
  bpp_side:
    driver: bridge
